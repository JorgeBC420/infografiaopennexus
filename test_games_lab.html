<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Games Lab Click</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a2e; color: white; }
        .test-section { border: 2px solid #00ffff; padding: 20px; margin: 20px 0; cursor: pointer; border-radius: 10px; }
        .test-section:hover { background: rgba(0, 255, 255, 0.1); }
        .hidden { display: none; }
        iframe { width: 100%; height: 600px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>🧪 Test de Funcionalidad Games Lab</h1>
    
    <div id="main-section" class="test-section" onclick="openGamesLab()">
        <h2>🎮 Click aquí para abrir Games Lab</h2>
        <p>Esta es una prueba para verificar que el click funciona</p>
    </div>
    
    <div id="games-section" class="hidden">
        <h2>🎮 Games Lab Abierto</h2>
        <button onclick="hideGamesLab()" style="padding: 10px 20px; margin-bottom: 20px;">🔙 Cerrar</button>
        <iframe src="games_lab_page.html"></iframe>
    </div>

    <script>
        function openGamesLab() {
            console.log('🎮 Abriendo Games Lab...');
            document.getElementById('games-section').classList.remove('hidden');
            document.getElementById('games-section').scrollIntoView({ behavior: 'smooth' });
        }

        function hideGamesLab() {
            console.log('🔙 Cerrando Games Lab...');
            document.getElementById('games-section').classList.add('hidden');
            document.getElementById('main-section').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
